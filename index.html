<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV - Adrian Cuesta Duran</title>

<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --azul-noche: #1a2a4c;
    --azul-acento: #4da6ff;
    --gris-fondo: #f0f2f5;
    --gris-texto: #333;
    --gris-suave: #7f8c8d;
    --blanco: #ffffff;
    --verde-boton: #27ae60;
}

body {
    font-family: 'Open Sans', Arial, sans-serif;
    background-color: var(--gris-fondo);
    padding: 20px;
}

/* BOTONES */
.language-switcher {
    text-align: center;
    margin-bottom: 30px;
}

.btn-lang, .btn-download {
    background-color: var(--azul-noche);
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 50px;
    cursor: pointer;
}

.btn-download { background-color: var(--verde-boton); }

/* CONTENEDOR */
.cv-container {
    display: flex;
    max-width: 900px;
    margin: auto;
    background: white;
    page-break-inside: avoid;
}

.left-column {
    width: 35%;
    background: var(--azul-noche);
    color: white;
    padding: 30px;
}

.right-column {
    width: 65%;
    padding: 40px;
}

/* PRINT FIX */
@media print {
    body {
        background: white;
        padding: 0;
    }

    .language-switcher {
        display: none;
    }

    .cv-container {
        width: 100%;
        max-width: 100%;
        box-shadow: none;
    }
}

</style>
</head>

<body>

<div class="language-switcher">
    <button onclick="switchLanguage('es')">Spanish</button>
    <button onclick="switchLanguage('en')">English</button>
    <button class="btn-download" onclick="descargarPDF()">⬇ Descargar PDF</button>
</div>

<!-- CV ESPAÑOL -->
<div id="cv-spanish" class="cv-container">
    <div class="left-column">
        <h2>Contacto</h2>
        <p>📞 6624733049</p>
        <p>✉️ adriancuesta58@gmail.com</p>
    </div>

    <div class="right-column">
        <h1>Adrian Cuesta Duran</h1>
        <p>Desarrollador & Automatización</p>
    </div>
</div>

<!-- CV INGLES -->
<div id="cv-english" class="cv-container" style="display:none;">
    <div class="left-column">
        <h2>Contact</h2>
        <p>📞 6624733049</p>
        <p>✉️ adriancuesta58@gmail.com</p>
    </div>

    <div class="right-column">
        <h1>Adrian Cuesta Duran</h1>
        <p>Developer & Automation Specialist</p>
    </div>
</div>

<script>
function switchLanguage(lang) {
    document.getElementById('cv-spanish').style.display = (lang === 'es') ? 'flex' : 'none';
    document.getElementById('cv-english').style.display = (lang === 'en') ? 'flex' : 'none';
}

function descargarPDF() {
    var cvEs = document.getElementById('cv-spanish');
    var cvEn = document.getElementById('cv-english');

    var elementToPrint = (cvEs.style.display !== 'none') ? cvEs : cvEn;
    var idiomaNombre = (cvEs.style.display !== 'none') ? 'ES' : 'EN';

    // CLONAR (clave para evitar errores de render)
    var clone = elementToPrint.cloneNode(true);

    var container = document.createElement("div");
    container.appendChild(clone);
    document.body.appendChild(container);

    var opt = {
        margin: 0,
        filename: 'CV_Adrian_Cuesta_' + idiomaNombre + '.pdf',
        image: { type: 'jpeg', quality: 1 },
        html2canvas: {
            scale: 3,
            useCORS: true,
            scrollY: 0
        },
        jsPDF: {
            unit: 'mm',
            format: 'a4',
            orientation: 'portrait'
        }
    };

    html2pdf().set(opt).from(clone).save().then(() => {
        document.body.removeChild(container);
    });
}
</script>

</body>
</html>
